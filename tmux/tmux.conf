# ================================================
#   TMUX CONFIG — GRUVBOX MATERIAL DARK
#   Arch Linux · lexo0x00
# ================================================

# ── PLUGINS ─────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# ── RESURRECT / CONTINUUM ───────────────────────
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# ── TERMINAL ─────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
set -g default-shell /usr/bin/fish

# ── BASE ─────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g repeat-time 600
set -g history-limit 100000
set -g display-time 2000
set -g mouse on
set -g status-position bottom
setw -g aggressive-resize on
setw -g monitor-activity on
set -g visual-activity off
set -g status off

# ── PREFIX ───────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── TEMA GRUVBOX MATERIAL DARK ───────────────────
# Paleta:
# bg0    #1d2021   bg1    #282828   bg2    #3c3836
# fg     #ebdbb2   gray   #a89984
# green  #a9b665   yellow #d8a657   blue   #7daea3
# red    #ea6962   purple #d3869b   aqua   #89b482

# Status bar
set -g status-style                  bg='#1d2021',fg='#a89984'
set -g status-left-style             bg='#1d2021',fg='#a9b665'
set -g status-right-style            bg='#1d2021',fg='#a89984'

# Ventanas
set -g window-status-style           bg='#1d2021',fg='#504945'
set -g window-status-current-style   bg='#282828',fg='#d8a657',bold
set -g window-status-activity-style  bg='#ea6962',fg='#1d2021'
set -g window-status-bell-style      bg='#d8a657',fg='#1d2021'

# Paneles
set -g pane-border-style             fg='#3c3836'
set -g pane-active-border-style      fg='#a9b665'

# Mensajes
set -g message-style                 bg='#d8a657',fg='#1d2021'
set -g message-command-style         bg='#3c3836',fg='#ebdbb2'

# Copy mode
set -g mode-style                    bg='#504945',fg='#ebdbb2'

# ── STATUS BAR ───────────────────────────────────
set -g status-left-length 50
set -g status-right-length 120

set -g status-left "\
#[bg=#a9b665,fg=#1d2021,bold]  #S \
#[bg=#1d2021,fg=#a9b665]"

set -g status-right "\
#[fg=#504945]│ \
#[fg=#7daea3]󰓾 #{=20:pane_title} \
#[fg=#504945]│ \
#[fg=#a89984]  %H:%M \
#[fg=#504945]│ \
#[fg=#a89984]  %d/%m/%Y \
#[fg=#504945]│ \
#[bg=#3c3836,fg=#d8a657] 󰣇 lexo0x00 "

# Formato ventanas
set -g window-status-format \
"#[fg=#504945] #I #[fg=#3c3836]#W "

set -g window-status-current-format \
"#[bg=#3c3836,fg=#d8a657,bold] #I #W #[bg=#1d2021,fg=#3c3836]"

set -g window-status-separator ""

# ── MODO VIM ─────────────────────────────────────
setw -g mode-keys vi
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ── SPLITS ───────────────────────────────────────
bind v split-window -h  -c "#{pane_current_path}"
bind d split-window -v  -c "#{pane_current_path}"
bind V split-window -hb -c "#{pane_current_path}"
bind D split-window -vb -c "#{pane_current_path}"
bind x kill-pane
bind-key -n M-x kill-pane

# ── NAVEGACION PANELES (vim-style) ───────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

# ── NAVEGACION VENTANAS ──────────────────────────
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
bind-key -n M-Left  previous-window
bind-key -n M-Right next-window
bind-key -n M-Up    new-window -c "#{pane_current_path}"
bind-key -n M-Down  kill-window

# ── RESIZE PANELES ───────────────────────────────
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# ── LAYOUTS ──────────────────────────────────────
bind = select-layout tiled
bind Space next-layout
bind-key -n M-Space next-layout
bind b set -g status

# ── VENTANAS Y SESIONES ──────────────────────────
bind c command-prompt -p "nombre:" "new-window -n '%%' -c '#{pane_current_path}'"
bind r command-prompt -I "#W" "rename-window '%%'"
bind R command-prompt -I "#S" "rename-session '%%'"
bind s choose-tree -Zs
bind S switch-client -l
bind D detach-client
bind C send-keys C-l \; send-keys Enter

# ── RELOAD ───────────────────────────────────────
bind U source-file ~/.tmux.conf \; display-message " Config recargada!"

# ── PENTEST LAYOUTS ──────────────────────────────
# Ctrl+a P → layout pentest (terminal + monitor + notas)
bind P \
    new-window -n "pentest" \; \
    split-window -h -p 40 \; \
    split-window -v -p 50 \; \
    select-pane -t 1 \; \
    send-keys "echo '  Pentest Layout'" Enter

# ── TPM ──────────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
