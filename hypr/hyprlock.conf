##################################################
#   HYPRLOCK CONFIG — GRUVBOX MATERIAL DARK
##################################################

background {
    monitor =
    path = ~/Pictures/Wallpapers/gruvbox.png
    blur_passes = 3
    blur_size = 7
    brightness = 0.6
    contrast = 1.0
    noise = 0.02
}

input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = rgb(3c3836)
    inner_color = rgb(282828)
    font_color = rgb(ebdbb2)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <span foreground="##a89984">password...</span>
    hide_input = false
    rounding = 6
    check_color = rgb(a9b665)
    fail_color = rgb(ea6962)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    capslock_color = rgb(d8a657)
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(ebdbb2)
    font_size = 72
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = rgb(a9b665)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -140
    halign = center
    valign = center
}
