# ================================================
#   KITTY CONFIG — GRUVBOX MATERIAL DARK
#   Arch Linux · lexo0x00
# ================================================

# ── FUENTE ──────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.5
disable_ligatures never

# ── CURSOR ──────────────────────────────────────
cursor_shape              block
cursor_blink_interval     0
cursor_stop_blinking_after 0
cursor_trail              3
cursor_trail_decay        0.1 0.4

# ── SCROLLBACK ──────────────────────────────────
scrollback_lines          100000
scrollback_pager          less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
wheel_scroll_multiplier   3.0

# ── RENDIMIENTO ─────────────────────────────────
repaint_delay    8
input_delay      2
sync_to_monitor  yes

# ── VENTANA ─────────────────────────────────────
background_opacity        0.92
background_blur           20
window_padding_width      8
hide_window_decorations   yes
confirm_os_window_close   0
placement_strategy        center
remember_window_size      yes
initial_window_width      1000
initial_window_height     650

# ── BELL ────────────────────────────────────────
enable_audio_bell    no
visual_bell_duration 0.0

# ── COLORES — GRUVBOX MATERIAL DARK ─────────────
foreground            #ebdbb2
background            #1d2021
selection_foreground  #1d2021
selection_background  #d8a657

# Cursor
cursor            #d8a657
cursor_text_color #1d2021

# Negro
color0  #1d2021
color8  #504945

# Rojo
color1  #ea6962
color9  #ea6962

# Verde
color2  #a9b665
color10 #a9b665

# Amarillo
color3  #d8a657
color11 #d8a657

# Azul
color4  #7daea3
color12 #7daea3

# Magenta / Purple
color5  #d3869b
color13 #d3869b

# Cyan / Aqua
color6  #89b482
color14 #89b482

# Blanco
color7  #d5c4a1
color15 #ebdbb2

# URL
url_color   #7daea3
url_style   curly

# Bordes de ventana
active_border_color   #a9b665
inactive_border_color #3c3836
bell_border_color     #d8a657

# Tabs
active_tab_foreground   #1d2021
active_tab_background   #d8a657
active_tab_font_style   bold
inactive_tab_foreground #a89984
inactive_tab_background #282828
inactive_tab_font_style normal
tab_bar_background      #1d2021
tab_bar_margin_color    #1d2021

# ── TAB BAR ─────────────────────────────────────
tab_bar_edge              top
tab_bar_style             powerline
tab_powerline_style       angled
tab_title_template        "{index}: {title}"
tab_bar_min_tabs          1

# ── MOUSE ───────────────────────────────────────
mouse_hide_wait      3.0
focus_follows_mouse  no
copy_on_select       yes
strip_trailing_spaces smart

# ── SHELL ───────────────────────────────────────
shell      /usr/bin/fish
editor     nvim
term       xterm-kitty

# ── ATAJOS ──────────────────────────────────────
kitty_mod ctrl+shift

# Clipboard
map kitty_mod+c  copy_to_clipboard
map kitty_mod+v  paste_from_clipboard

# Tamaño de fuente
map kitty_mod+equal  change_font_size all +1.0
map kitty_mod+minus  change_font_size all -1.0
map kitty_mod+0      change_font_size all 0

# Ventanas (splits)
map kitty_mod+enter  launch --location=vsplit --cwd=current
map kitty_mod+d      launch --location=hsplit --cwd=current

# Navegación entre ventanas (vim-style)
map kitty_mod+h      neighboring_window left
map kitty_mod+l      neighboring_window right
map kitty_mod+k      neighboring_window up
map kitty_mod+j      neighboring_window down

# Resize ventanas
map kitty_mod+left   resize_window narrower 3
map kitty_mod+right  resize_window wider 3
map kitty_mod+up     resize_window taller 3
map kitty_mod+down   resize_window shorter 3

# Tabs
map kitty_mod+t      new_tab_with_cwd
map kitty_mod+q      close_tab
map kitty_mod+right  next_tab
map kitty_mod+left   previous_tab
map ctrl+alt+1       goto_tab 1
map ctrl+alt+2       goto_tab 2
map ctrl+alt+3       goto_tab 3
map ctrl+alt+4       goto_tab 4
map ctrl+alt+5       goto_tab 5

# Fullscreen
map kitty_mod+f11    toggle_fullscreen

# Reload config
map kitty_mod+f5     load_config_file

# Scroll
map kitty_mod+page_up    scroll_page_up
map kitty_mod+page_down  scroll_page_down
map kitty_mod+home       scroll_home
map kitty_mod+end        scroll_end

# Limpiar terminal
map kitty_mod+delete clear_terminal reset active

# URLs
map kitty_mod+e open_url_with_hints
